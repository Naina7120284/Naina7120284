<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d130d"/>
      <stop offset="100%" stop-color="#16241a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#9ee62c"/>
      <stop offset="100%" stop-color="#6B8F3A"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="260" fill="url(#bg)"/>

  <!-- asymmetric diagonal split panel (not a wave) -->
  <polygon points="780,0 1200,0 1200,260 900,260" fill="#ffffff" fill-opacity="0.03"/>
  <line x1="780" y1="0" x2="900" y2="260" stroke="#9ee62c" stroke-opacity="0.35" stroke-width="2"/>

  <!-- monogram mark: bracket + N -->
  <g transform="translate(950,60)">
    <text x="0" y="90" font-family="Menlo, Consolas, monospace" font-size="140" font-weight="700" fill="#9ee62c" fill-opacity="0.9">N</text>
    <text x="-40" y="90" font-family="Menlo, Consolas, monospace" font-size="140" font-weight="300" fill="#ffffff" fill-opacity="0.15">&lt;</text>
    <text x="130" y="90" font-family="Menlo, Consolas, monospace" font-size="140" font-weight="300" fill="#ffffff" fill-opacity="0.15">/&gt;</text>
  </g>

  <!-- pulsing accent dot -->
  <circle cx="95" cy="63" r="7" fill="#9ee62c">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- name -->
  <text x="120" y="80" font-family="Arial, Helvetica, sans-serif" font-size="46" font-weight="700" fill="#f5f7f4">
    Naina Shukla
  </text>

  <!-- animated underline sweep -->
  <rect x="120" y="98" width="0" height="4" rx="2" fill="url(#accent)">
    <animate attributeName="width" values="0;340;340" keyTimes="0;0.6;1" dur="2.5s" fill="freeze"/>
  </rect>

  <!-- role line -->
  <text x="120" y="145" font-family="Arial, Helvetica, sans-serif" font-size="20" fill="#c9cdc7">
    Full Stack Developer &#8226; MERN &amp; Next.js &#8226; Shipping real, deployed products
  </text>

  <!-- small tag row -->
  <g font-family="Menlo, Consolas, monospace" font-size="14" fill="#9ee62c" fill-opacity="0.8">
    <rect x="120" y="170" width="86" height="26" rx="13" fill="#9ee62c" fill-opacity="0.1" stroke="#9ee62c" stroke-opacity="0.4"/>
    <text x="135" y="187">MERN</text>

    <rect x="216" y="170" width="96" height="26" rx="13" fill="#9ee62c" fill-opacity="0.1" stroke="#9ee62c" stroke-opacity="0.4"/>
    <text x="231" y="187">Next.js</text>

    <rect x="322" y="170" width="96" height="26" rx="13" fill="#9ee62c" fill-opacity="0.1" stroke="#9ee62c" stroke-opacity="0.4"/>
    <text x="337" y="187">FastAPI</text>

    <rect x="428" y="170" width="76" height="26" rx="13" fill="#9ee62c" fill-opacity="0.1" stroke="#9ee62c" stroke-opacity="0.4"/>
    <text x="443" y="187">AI/RAG</text>
  </g>
</svg>

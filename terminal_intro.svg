<svg width="600" height="280" viewBox="0 0 600 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .line { font-family: Menlo, Consolas, monospace; font-size: 16px; opacity: 0; }
    </style>
  </defs>

  <!-- terminal window -->
  <rect x="0" y="0" width="600" height="280" rx="12" fill="#0d1117"/>
  <rect x="0" y="0" width="600" height="34" rx="12" fill="#161b22"/>
  <rect x="0" y="22" width="600" height="12" fill="#161b22"/>

  <circle cx="22" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="44" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="17" r="6" fill="#27c93f"/>
  <text x="300" y="22" text-anchor="middle" font-family="Menlo, Consolas, monospace" font-size="12" fill="#8b949e">naina@dev: ~</text>

  <!-- terminal lines, staggered fade-in -->
  <text class="line" x="24" y="70" fill="#6B8F3A">
    $ <tspan fill="#c9d1d9">whoami</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.4s" fill="freeze"/>
  </text>
  <text class="line" x="24" y="95" fill="#9ee62c">
    naina-shukla
    <animate attributeName="opacity" from="0" to="1" begin="0.8s" dur="0.4s" fill="freeze"/>
  </text>

  <text class="line" x="24" y="130" fill="#6B8F3A">
    $ <tspan fill="#c9d1d9">cat role.txt</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="1.4s" dur="0.4s" fill="freeze"/>
  </text>
  <text class="line" x="24" y="155" fill="#e6edf3">
    Full Stack Developer — MERN, Next.js, FastAPI
    <animate attributeName="opacity" from="0" to="1" begin="2.0s" dur="0.4s" fill="freeze"/>
  </text>

  <text class="line" x="24" y="190" fill="#6B8F3A">
    $ <tspan fill="#c9d1d9">./currently_building.sh</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="2.6s" dur="0.4s" fill="freeze"/>
  </text>
  <text class="line" x="24" y="215" fill="#e6edf3">
    Real-time voice AI &#183; RAG &#183; vector search
    <animate attributeName="opacity" from="0" to="1" begin="3.2s" dur="0.4s" fill="freeze"/>
  </text>

  <text x="24" y="250" font-family="Menlo, Consolas, monospace" font-size="16" fill="#6B8F3A" opacity="0">
    $ <tspan fill="#9ee62c">status: open to work</tspan>
    <animate attributeName="opacity" from="0" to="1" begin="3.8s" dur="0.4s" fill="freeze"/>
  </text>

  <!-- blinking cursor -->
  <rect x="230" y="238" width="9" height="16" fill="#9ee62c" opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="4.2s" dur="0.1s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0;1" begin="4.2s" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
